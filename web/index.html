<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <!-- Self-hosted fonts (see web/src/styles/fonts.css). Preload the two
         most-visible faces — Inter (body) + Bowlby One (display) — to cut the
         swap flash; Permanent Marker + Special Elite are accent-only. -->
    <link
      rel="preload"
      href="/fonts/inter-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/bowlby-one-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Grave Goods — Stickers for the positively damned</title>
    <meta
      name="description"
      content="Punk-leftist die-cut vinyl stickers. Solo-operator side project. Half the profits fund bail."
    />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Grave Goods — Stickers for the positively damned"
    />
    <meta
      property="og:description"
      content="Punk-leftist die-cut vinyl stickers. Solo-operator side project. Half the profits fund bail."
    />
    <!-- TODO: add og:url + og:image (1200x630) before launch -->

    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
